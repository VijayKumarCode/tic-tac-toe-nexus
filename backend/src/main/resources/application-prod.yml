# application-prod.yml
spring:
  profiles: prod
  datasource:
    url: ${DB_URL} # e.g. jdbc:postgresql://host:5432/dbname
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # do not use update in production
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  base-url: ${APP_BASE}
  mail-from: ${MAIL_FROM}
  resend-api-key: ${RESEND_API_KEY} # prefer HTTP API for Resend

server:
  port: ${PORT:8080}

cors:
  allowed-origin: ${FRONTEND_URL}
