spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_db
    username: postgres
    password: ${DEV_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Enable Flyway locally if you want migrations applied automatically
# flyway:
#   enabled: true
#   baseline-on-migrate: true

app:
  base-url: http://localhost:8080
  resend-api-key: ${RESEND_API_KEY:}

server:
  port: ${PORT:8080}

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
