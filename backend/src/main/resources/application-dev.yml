spring:
  config:
    activate:
      on-profile: dev  # ✅ CHANGED: Updated from spring.profiles

  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_db
    username: postgres
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  base-url: http://localhost:8080
  resend-api-key: ${RESEND_API_KEY}

server:
  port: ${PORT:8080}
