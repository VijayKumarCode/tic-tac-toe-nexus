<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Multiplayer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .screen { text-align: center; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 88%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #fff; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; border-radius: 10px; }
        #status-indicator { margin-bottom: 20px; padding: 10px; border-radius: 10px; font-size: 0.9rem; width: 100%; font-weight: bold; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="register-screen" class="screen" style="display: none;">
    <h2>Register</h2>
    <input type="text" id="reg-username" placeholder="Username">
    <input type="password" id="reg-password" placeholder="Password">
    <button class="btn-primary" onclick="register()">Create Account</button>
    <p onclick="showScreen('login-screen')" style="color: blue; cursor: pointer; font-size: 0.8rem;">Login instead</p>
</div>

<div id="login-screen" class="screen">
    <h2>Nexus Login</h2>
    <input type="text" id="login-username" placeholder="Username">
    <input type="password" id="login-password" placeholder="Password">
    <button class="btn-success" onclick="login()">Login</button>
    <p onclick="showScreen('register-screen')" style="color: blue; cursor: pointer; font-size: 0.8rem;">Create account</p>
</div>

<div id="lobby-screen" class="screen" style="display: none; width: 600px; display: flex; gap: 20px;">
    <div style="flex: 1;">
        <h2 id="lobby-greeting">Player Lobby</h2>
        <div id="online-users-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #eee; padding: 10px;">
            <p>Scanning for players...</p>
        </div>
        <button class="btn-danger" onclick="logout()">Logout</button>
    </div>

    <div style="flex: 0.8; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #ddd;">
        <h3 style="margin-top: 0;">🏆 Top Players</h3>
        <div id="leaderboard-list" style="font-size: 0.9rem;">
            <p>Loading rankings...</p>
        </div>
    </div>
</div>

<div id="game-container" style="display: none; text-align: center;">
    <div style="margin-top: 20px;">
        <button class="btn-primary" onclick="sendToss()" style="width: auto; padding: 10px 20px;">Toss</button>
        <button class="btn-danger" onclick="sendReset()" style="width: auto; padding: 10px 20px;">Reset</button>
        <button class="btn-danger" style="margin-left: 10px; width: auto; padding: 10px 20px;" onclick="leaveGame()">Leave Game</button>
    </div>
    <div id="status-indicator" style="background: #eee;">Waiting for game to start...</div>
    <div class="grid" id="board">
        <div class="cell" onclick="sendMove(0)"></div>
        <div class="cell" onclick="sendMove(1)"></div>
        <div class="cell" onclick="sendMove(2)"></div>
        <div class="cell" onclick="sendMove(3)"></div>
        <div class="cell" onclick="sendMove(4)"></div>
        <div class="cell" onclick="sendMove(5)"></div>
        <div class="cell" onclick="sendMove(6)"></div>
        <div class="cell" onclick="sendMove(7)"></div>
        <div class="cell" onclick="sendMove(8)"></div>
    </div>
</div>

<div id="challenge-modal" class="screen" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; border: 2px solid #007bff;">
    <h3 id="challenge-text">Someone challenged you!</h3>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
        <button class="btn-success" onclick="acceptChallenge()">Accept</button>
        <button class="btn-danger" onclick="declineChallenge()">Decline</button>
    </div>
</div>

<div id="waiting-modal" class="screen" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; border: 2px solid #ffc107;">
    <h3 id="waiting-text">Waiting for response...</h3>
</div>

<div id="toss-modal" class="screen" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; border: 2px solid #28a745;">
    <h3>You won the toss!</h3>
    <p>Would you like to play first or pass?</p>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
        <button class="btn-success" onclick="submitTossChoice('PLAY')">Play First</button>
        <button class="btn-primary" onclick="submitTossChoice('PASS')">Pass</button>
    </div>
</div>

<script>
    let stompClient = null;
    let currentUser = "";
    let opponentUser = "";
    let currentRoomId = "";
    let currentPendingOpponent = null;
    let isMyTurn = false;
    let isGameOver = false;
    let roomSubscription = null;

    const API_BASE = "/api/users";
    const statusEl = document.getElementById('status-indicator');

    window.onload = async function() {
        const saved = localStorage.getItem('nexus_user');
        if (saved) {
            currentUser = saved;
            updateLobbyGreeting();
            try {
                await fetch(`${API_BASE}/sync?username=${currentUser}`, { method: 'POST' });
                showScreen('lobby-screen');
                connect();
                startLobbyRefresh();
            } catch (err) {
                console.error("Presence sync failed:", err);
            }
        }
    };

    function showScreen(screenId) {
        document.querySelectorAll('.screen, #game-container').forEach(el => el.style.display = 'none');
        document.getElementById(screenId).style.display = 'block';
        if (screenId === 'lobby-screen') {
            document.getElementById(screenId).style.display = 'flex';
        }
    }

    async function register() {
        const u = document.getElementById('reg-username').value;
        const p = document.getElementById('reg-password').value;
        const res = await fetch(`${API_BASE}/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        if (res.ok) { alert("Success! Please login."); showScreen('login-screen'); }
        else { alert(await res.text()); }
    }

    async function login() {
        const u = document.getElementById('login-username').value;
        const p = document.getElementById('login-password').value;

        const res = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });

        if (res.ok) {
            currentUser = u;
            localStorage.setItem('nexus_user', u);
            updateLobbyGreeting();

            // ✅ ADD THIS
            await fetch(`${API_BASE}/sync?username=${currentUser}`, { method: 'POST' });

            showScreen('lobby-screen');
            connect();
            startLobbyRefresh();
        } else {
            alert("Login failed");
        }
    }

    function startLobbyRefresh() {
        refreshLobby();
        refreshLeaderboard();
        setInterval(() => {
            refreshLobby();
            refreshLeaderboard();
        }, 5000);
    }

    function updateLobbyGreeting() {
        document.getElementById('lobby-greeting').innerText = `Lobby - Welcome, ${currentUser}!`;
    }

    async function refreshLeaderboard() {
        const response = await fetch(`${API_BASE}/leaderboard`);
        const players = await response.json();
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';

        players.forEach(player => {
            const item = document.createElement('div');
            item.className = 'leaderboard-item';
            item.innerHTML = `
                <span>${player.username}</span>
                <span class="badge">${player.wins || 0} Wins</span>
            `;
            list.appendChild(item);
        });
    }

    function handleChallenge(msg) {
        if (msg.status === "PENDING") {
            if (confirm(`${msg.sender} wants to play!`)) {
                stompClient.send("/app/challenge/reply", {}, JSON.stringify({
                    sender: msg.sender,
                    receiver: currentUser,
                    roomId: msg.roomId,
                    status: "ACCEPTED"
                }));
                setupGame(msg.roomId, msg.sender);
            }
        } else if (msg.status === "ACCEPTED") {
            setupGame(msg.roomId, msg.receiver);
        } else if (msg.status === "CANCELLED") {
            alert("The challenge was cancelled.");
        }
    }

    function setupGame(roomId, opponent) {
    currentRoomId = roomId;
    opponentUser = opponent;
    showScreen('game-container');

    // Reset subscription for the new room
    if (roomSubscription) roomSubscription.unsubscribe();
    roomSubscription = stompClient.subscribe(`/topic/game/${currentRoomId}`, m => handleRoomMessage(JSON.parse(m.body)));

    clearBoardUI();

    // Prevent duplicate tosses: Only one player gets to see the Toss button
    const tossBtn = document.querySelector('button[onclick="sendToss()"]');

    if (currentUser < opponentUser) {
        tossBtn.style.display = 'inline-block';
        statusEl.innerText = `Room Ready | vs ${opponentUser} | Click 'Toss' to begin!`;
    } else {
        tossBtn.style.display = 'none';
        statusEl.innerText = `Room Ready | vs ${opponentUser} | Waiting for opponent to toss...`;
    }
}

    function handleRoomMessage(payload) {
        if (payload.type) {
            if (payload.type === "GAME_ABORTED") {
                alert(`${payload.sender} has left the game. Returning to lobby.`);
                returnToLobbyLocal();
                return;
            }

            if (payload.type === "GAME_RESET") {
                clearBoardUI();
                return;
            }

            // FIXED: Toss Result Logic for Pass/Play
            if (payload.type === "TOSS_RESULT") {
                if (payload.payload === currentUser) {
                    document.getElementById('toss-modal').style.display = 'block';
                    statusEl.innerText = "You won the toss! Choose Pass or Play.";
                } else {
                    isMyTurn = false;
                    statusEl.innerText = `${opponentUser} won the toss. Waiting for their choice...`;
                }
                return;
            }

          if (payload.type === "GAME_START") { // FIX: Changed from TOSS_DECISION to GAME_START
                if (payload.payload === currentUser) {
                    isMyTurn = true;
                    statusEl.innerText = "Your turn! Make a move.";
                } else {
                    isMyTurn = false;
                    statusEl.innerText = `It is ${opponentUser}'s turn.`;
                }
                return;
            }
        }

        if (payload.boardPosition !== undefined && payload.boardPosition !== null) {
            const cells = document.getElementsByClassName('cell');
            const pos = parseInt(payload.boardPosition);

            if (cells[pos]) {
                cells[pos].innerText = payload.symbol;
                cells[pos].style.color = (payload.symbol === 'X') ? '#007bff' : '#dc3545';

                if (payload.gameState && payload.gameState !== "ONGOING") {
                    isGameOver = true;
                    statusEl.innerText = `Game Over: ${payload.gameState}`;
                    setTimeout(() => alert("Game Over: " + payload.gameState), 100);
                } else if (payload.playerUsername !== currentUser) {
                    isMyTurn = true;
                    statusEl.innerText = "Your turn!";
                } else {
                    statusEl.innerText = "Waiting for opponent...";
                }
            }
        }
   }



   async function refreshLobby() {
        const lobbyScreen = document.getElementById('lobby-screen');
        if (lobbyScreen.style.display === 'none') return;

        try {
            const res = await fetch(`${API_BASE}/lobby`);
            if (!res.ok) throw new Error("Lobby fetch failed");

            const users = await res.json();
            const list = document.getElementById('online-users-list');

            list.innerHTML = "";

            let otherPlayersFound = false;
            users.forEach(user => {
                if (user.username !== currentUser) {
                    otherPlayersFound = true;
                    const isBusy = user.status === "IN_GAME";
                    const statusColor = isBusy ? "#dc3545" : (user.status === "ONLINE" ? "#28a745" : "#6c757d");

                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `
                        <div>
                            <span style="font-weight: bold;">${user.username}</span>
                            <span style="margin-left: 8px; font-size: 0.8em; padding: 2px 6px; border-radius: 10px; background: ${statusColor}; color: white;">
                                ${user.status}
                            </span>
                        </div>
                        <button class="btn-success"
                                style="width:auto; padding:5px 10px;"
                                ${(user.status !== "ONLINE" || isBusy) ? "disabled style='opacity:0.5;'" : ""}
                                onclick="sendChallenge('${user.username}')">
                            Challenge
                        </button>`;
                    list.appendChild(userDiv);
                }
            });

            if (!otherPlayersFound) {
                list.innerHTML = "<p>No other players online.</p>";
            }
        } catch (err) {
            console.error("Lobby refresh error:", err);
        }
   }

    function sendMove(pos) {
        if (isGameOver) { alert("Game is over."); return; }
        if (!isMyTurn) { console.warn("It's not your turn!"); return; }

        const move = {
            playerUsername: currentUser,
            boardPosition: pos,
            roomId: currentRoomId
        };

        stompClient.send(`/app/move/${currentRoomId}`, {}, JSON.stringify(move));
        isMyTurn = false;
        statusEl.innerText = "Waiting for opponent...";
    }

    function sendToss() {
    if (currentRoomId) {
        const tossRequest = {
            playerOne: currentUser,
            playerTwo: opponentUser
        };

        // Send the payload to the backend
        stompClient.send(`/app/toss/${currentRoomId}`, {}, JSON.stringify(tossRequest));

        // Hide the button immediately to prevent double-clicking
        document.querySelector('button[onclick="sendToss()"]').style.display = 'none';
        statusEl.innerText = "Flipping the coin...";
    }
}

    function sendReset() {
        if (currentRoomId) { stompClient.send(`/app/reset/${currentRoomId}`, {}, {}); }
    }

    function clearBoardUI() {
        isGameOver = false;
        isMyTurn = false;
        statusEl.innerText = "Board cleared. Toss to see who goes first!";
        Array.from(document.getElementsByClassName('cell')).forEach(c => {
            c.innerText = "";
            c.style.color = "";
        });
    }

    function connect() {
        const socket = new SockJS('/game-websocket');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function(frame) {
          stompClient.subscribe('/topic/challenges/' + currentUser, function (payload) {
            const message = JSON.parse(payload.body);
            if (message.type === 'CHALLENGE_REQUEST') {
                if (message.sender !== currentUser) {
                    showChallengeModal(message.sender, message.roomId);
                }
            } else if (message.type === 'CHALLENGE_RESPONSE') {
                handleChallengeResponse(message);
            }
        });
        }, function(error) { console.error("WebSocket connection error:", error); });
    }

    function handleChallengeResponse(message) {
        // HIDE WAITING UI
        document.getElementById('waiting-modal').style.display = 'none';

        if (message.status === "ACCEPTED") {
            alert("Challenge Accepted! Joining game...");
            const opponent = message.sender === currentUser ? message.receiver : message.sender;
            setupGame(message.roomId, opponent);
        } else if (message.status === "DECLINED") {
            alert(message.sender + " declined your challenge.");
        }
    }

    function showChallengeModal(opponent, roomId) {
        currentPendingOpponent = opponent;
        currentRoomId = roomId;
        document.getElementById('challenge-text').innerText = `${opponent} challenged you!`;
        document.getElementById('challenge-modal').style.display = 'block';
    }

    function sendChallenge(opponentUsername) {
        const challengeRequest = {
            sender: currentUser,
            receiver: opponentUsername,
            roomId: currentUser + "_" + opponentUsername + "_" + Date.now(),
            type: "CHALLENGE_REQUEST"
        };
        stompClient.send("/app/challenge", {}, JSON.stringify(challengeRequest));

        // SHOW WAITING UI
        document.getElementById('waiting-text').innerText = `Waiting for ${opponentUsername} to accept...`;
        document.getElementById('waiting-modal').style.display = 'block';
    }

    function acceptChallenge() {
        if (!stompClient || !currentPendingOpponent) return;

        const response = {
            sender: currentPendingOpponent, // The person who SENT the challenge (Suresh)
            receiver: currentUser,          // You (Ramesh)
            roomId: currentRoomId,
            status: "ACCEPTED",
            type: "CHALLENGE_RESPONSE"
        };

        stompClient.send("/app/challenge/reply", {}, JSON.stringify(response));
        document.getElementById('challenge-modal').style.display = 'none';

        // Transition your UI to the game screen immediately
        setupGame(currentRoomId, currentPendingOpponent);
    }

    function declineChallenge() {
        if (!stompClient || !currentPendingOpponent) return;

        const response = {
            sender: currentPendingOpponent,
            receiver: currentUser,
            roomId: currentRoomId,
            status: "DECLINED",
            type: "CHALLENGE_RESPONSE"
        };

        stompClient.send("/app/challenge/reply", {}, JSON.stringify(response));
        document.getElementById('challenge-modal').style.display = 'none';
        currentPendingOpponent = null;
    }

   function submitTossChoice(choice) {
    const tossDecision = {
        winner: currentUser,
        loser: opponentUser,
        message: choice // 'PLAY' or 'PASS'
    };

    // FIX: Must match @MessageMapping("/toss/decision/{roomId}") exactly
    stompClient.send(`/app/toss/decision/${currentRoomId}`, {}, JSON.stringify(tossDecision));
    document.getElementById('toss-modal').style.display = 'none';
    }

    function leaveGame() {
        if (confirm("Are you sure you want to leave? This will abort the match.")) {
            stompClient.send("/app/game.abort", {}, JSON.stringify({
                roomId: currentRoomId,
                sender: currentUser
            }));
            returnToLobbyLocal();
        }
    }

    function returnToLobbyLocal() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('lobby-screen').style.display = 'flex';
        currentRoomId = null;
        opponentUser = null;
        clearBoardUI();
        refreshLobby();
    }

    async function logout() {
        await fetch(`${API_BASE}/logout/${currentUser}`, {method: 'POST'});
        localStorage.removeItem('nexus_user');
        location.reload();
    }
</script>
</body>
</html>
